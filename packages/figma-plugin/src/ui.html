<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critique Lens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; font-size: 13px; color: #1a1a1a; background: #fff; padding: 16px; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .btn { display: block; width: 100%; padding: 10px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
    .btn:hover { background: #333; }
    .btn-secondary { background: transparent; color: #1a1a1a; border: 1px solid #e0e0e0; }
    .btn-secondary:hover { background: #f5f5f5; }
    .status { margin-top: 12px; font-size: 12px; color: #666; min-height: 20px; }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <h1>Critique Lens</h1>
  <p style="color:#666; margin-bottom:16px; font-size:12px;">Select a frame, then run a preflight critique against a reviewer persona.</p>
  <button class="btn" id="btn-analyze">Analyze Selected Frame</button>
  <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
  <div class="status" id="status"></div>

  <script>
    const status = document.getElementById('status');

    document.getElementById('btn-analyze').onclick = () => {
      status.textContent = 'Exporting frame…';
      status.className = 'status';
      parent.postMessage({ pluginMessage: { type: 'analyze-frame' } }, '*');
    };

    document.getElementById('btn-cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'frame-data') {
        status.textContent = `Frame "${msg.payload.name}" captured (${msg.payload.width}×${msg.payload.height}). Sending to Critique Lens…`;
        // TODO: POST to web app API
      }

      if (msg.type === 'error') {
        status.className = 'status error';
        status.textContent = msg.message;
      }
    };
  </script>
</body>
</html>
