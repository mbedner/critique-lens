<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critique Lens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon {
      width: 22px; height: 22px;
      background: #1a1a1a;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { width: 12px; height: 12px; fill: #fff; }
    .header h1 { font-size: 13px; font-weight: 600; flex: 1; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    label { font-size: 11px; font-weight: 500; color: #666; display: block; margin-bottom: 4px; }

    select, textarea, input {
      width: 100%; padding: 7px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, textarea:focus, input:focus { border-color: #1a1a1a; }
    textarea { resize: vertical; min-height: 64px; font-family: inherit; }

    .btn {
      width: 100%; padding: 9px;
      border: none; border-radius: 6px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
      position: relative;
    }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #333; }
    .btn-primary:disabled { background: #999; cursor: not-allowed; }
    .btn-secondary { background: transparent; color: #1a1a1a; border: 1px solid #e0e0e0; }
    .btn-secondary:hover { background: #f5f5f5; }

    /* Keyboard shortcut badge on buttons */
    .btn-kbd {
      position: absolute;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0.5;
    }
    .btn:hover .btn-kbd { opacity: 0.75; }
    .btn:disabled .btn-kbd { display: none; }

    kbd {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      font-size: 10px;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      line-height: 1.4;
    }
    .btn-secondary kbd {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.12);
    }

    .divider { height: 1px; background: #f0f0f0; margin: 0; }

    .status-bar {
      padding: 10px 16px;
      font-size: 11px;
      color: #666;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-top: 1px solid #f0f0f0;
    }
    .status-bar.error { color: #c0392b; }
    .status-bar.success { color: #16a34a; }

    .frame-preview {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
      background: #fafafa;
      display: none;
    }
    .frame-preview.visible { display: block; }
    .frame-preview img { width: 100%; display: block; max-height: 140px; object-fit: contain; }
    .frame-preview-meta {
      padding: 6px 10px;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #e0e0e0;
      display: flex; justify-content: space-between;
    }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }

    .app-url-notice {
      font-size: 10px; color: #999;
      text-align: center; padding: 4px 16px 8px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
  </div>
  <h1>Critique Lens</h1>
</div>

<div class="body">

  <!-- Frame Preview -->
  <div class="frame-preview" id="frame-preview">
    <img id="preview-img" src="" alt="" />
    <div class="frame-preview-meta">
      <span id="preview-name">—</span>
      <span id="preview-size">—</span>
    </div>
  </div>

  <!-- Reviewer -->
  <div>
    <label for="reviewer-select">Reviewer *</label>
    <select id="reviewer-select">
      <option value="">Loading reviewers…</option>
    </select>
  </div>

  <!-- Project + PBI -->
  <div class="row">
    <div>
      <label for="project-select">Project</label>
      <select id="project-select">
        <option value="">None</option>
      </select>
    </div>
    <div>
      <label for="pbi-select">PBI</label>
      <select id="pbi-select" disabled>
        <option value="">None</option>
      </select>
    </div>
  </div>

  <!-- Notes -->
  <div>
    <label for="notes">Annotation notes (optional)</label>
    <textarea id="notes" placeholder="Hover states, interaction intent, known constraints…"></textarea>
  </div>

  <!-- App URL -->
  <div>
    <label for="app-url">Critique Lens URL</label>
    <input id="app-url" type="url" placeholder="http://localhost:3000" value="http://localhost:3000" />
  </div>

  <!-- Actions -->
  <button class="btn btn-primary" id="btn-capture" onclick="captureFrame()">
    <span class="spinner" id="spinner-capture"></span>
    Capture Frame
    <span class="btn-kbd"><kbd>⌘</kbd><kbd>↵</kbd></span>
  </button>

  <button class="btn btn-primary" id="btn-analyze" onclick="runAnalysis()" disabled>
    <span class="spinner" id="spinner-analyze"></span>
    Run Preflight Critique
    <span class="btn-kbd"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>↵</kbd></span>
  </button>

  <button class="btn btn-secondary" onclick="closePlugin()">
    Cancel
    <span class="btn-kbd" style="opacity:0.4;"><kbd style="background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.12);">⎋</kbd></span>
  </button>
</div>

<div class="app-url-notice">Connects to your running Critique Lens app</div>

<div class="status-bar" id="status-bar">
  Select a frame to get started.
</div>

<script>
  let capturedImageBytes = null;
  let capturedFrameName = null;
  let allPbis = [];

  // --- Keyboard shortcuts ---

  const isMac = navigator.platform.toUpperCase().includes('MAC');

  // Update kbd labels for non-Mac
  if (!isMac) {
    document.querySelectorAll('.btn-kbd kbd:first-child, .shortcut-key kbd:first-child').forEach(el => {
      if (el.textContent === '⌘') el.textContent = 'Ctrl';
    });
  }

  document.addEventListener('keydown', (e) => {
    const cmd = isMac ? e.metaKey : e.ctrlKey;
    const activeTag = document.activeElement?.tagName;
    const inTextInput = activeTag === 'TEXTAREA' || (activeTag === 'INPUT' && document.activeElement.type !== 'url');

    // ⌘↵ — Capture frame (works anywhere except textarea)
    if (cmd && e.key === 'Enter' && !e.shiftKey && !inTextInput) {
      e.preventDefault();
      const btn = document.getElementById('btn-capture');
      if (!btn.disabled) captureFrame();
      return;
    }

    // ⌘⇧↵ — Run analysis (works anywhere)
    if (cmd && e.shiftKey && e.key === 'Enter') {
      e.preventDefault();
      const btn = document.getElementById('btn-analyze');
      if (!btn.disabled) runAnalysis();
      return;
    }

    // Escape — close plugin
    if (e.key === 'Escape') {
      closePlugin();
    }
  });

  // --- UI helpers ---

  function closePlugin() {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  }

  function setStatus(msg, type = '') {
    const bar = document.getElementById('status-bar');
    bar.textContent = msg;
    bar.className = 'status-bar' + (type ? ` ${type}` : '');
  }

  function setLoading(buttonId, spinnerId, loading) {
    const btn = document.getElementById(buttonId);
    const spinner = document.getElementById(spinnerId);
    spinner.style.display = loading ? 'inline-block' : 'none';
    btn.disabled = loading;
  }

  // --- Load reviewers + projects from app ---

  async function loadData() {
    const base = document.getElementById('app-url').value.replace(/\/$/, '');
    try {
      const [reviewersRes, projectsRes] = await Promise.all([
        fetch(`${base}/api/reviewers`),
        fetch(`${base}/api/projects`),
      ]);

      if (reviewersRes.ok) {
        const reviewers = await reviewersRes.json();
        const sel = document.getElementById('reviewer-select');
        sel.innerHTML = '<option value="">Select reviewer…</option>';
        reviewers.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r.id;
          opt.textContent = r.name + (r.role ? ` · ${r.role}` : '');
          sel.appendChild(opt);
        });
      }

      if (projectsRes.ok) {
        const projects = await projectsRes.json();
        const sel = document.getElementById('project-select');
        sel.innerHTML = '<option value="">None</option>';
        projects.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          sel.appendChild(opt);
        });

        allPbis = [];
        await Promise.all(projects.map(async p => {
          const res = await fetch(`${base}/api/projects/${p.id}/pbis`);
          if (res.ok) {
            const pbis = await res.json();
            allPbis.push(...pbis);
          }
        }));
      }

      setStatus('Ready. Select a frame and capture it.');
    } catch {
      setStatus('Could not connect to Critique Lens app. Check the URL.', 'error');
    }
  }

  document.getElementById('project-select').addEventListener('change', function() {
    const projectId = this.value;
    const pbiSel = document.getElementById('pbi-select');
    const filtered = allPbis.filter(p => !projectId || p.projectId === projectId);
    pbiSel.innerHTML = '<option value="">None</option>';
    filtered.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.title;
      pbiSel.appendChild(opt);
    });
    pbiSel.disabled = filtered.length === 0;
  });

  document.getElementById('app-url').addEventListener('change', loadData);

  // --- Capture frame ---

  function captureFrame() {
    setLoading('btn-capture', 'spinner-capture', true);
    setStatus('Exporting frame…');
    parent.postMessage({ pluginMessage: { type: 'analyze-frame' } }, '*');
  }

  // --- Run analysis ---

  async function runAnalysis() {
    if (!capturedImageBytes) { setStatus('Capture a frame first.', 'error'); return; }
    const reviewerId = document.getElementById('reviewer-select').value;
    if (!reviewerId) { setStatus('Select a reviewer.', 'error'); return; }

    setLoading('btn-analyze', 'spinner-analyze', true);
    setStatus('Running preflight critique…');

    try {
      const base = document.getElementById('app-url').value.replace(/\/$/, '');
      const projectId = document.getElementById('project-select').value;
      const pbiId = document.getElementById('pbi-select').value;
      const notes = document.getElementById('notes').value;

      const blob = new Blob([new Uint8Array(capturedImageBytes)], { type: 'image/png' });
      const formData = new FormData();
      formData.append('image', blob, `${capturedFrameName || 'frame'}.png`);
      formData.append('reviewerId', reviewerId);
      if (projectId) formData.append('projectId', projectId);
      if (pbiId) formData.append('pbiId', pbiId);
      if (notes) formData.append('annotationNotes', notes);

      const res = await fetch(`${base}/api/preflight`, { method: 'POST', body: formData });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      setStatus(`✓ Analysis complete! Score: ${data.readinessScore ?? '—'}/100`, 'success');
      window.open(`${base}/preflight/${data.id}`, '_blank');
    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error');
    } finally {
      setLoading('btn-analyze', 'spinner-analyze', false);
    }
  }

  // --- Message handler ---

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'frame-data') {
      capturedImageBytes = msg.payload.imageBytes;
      capturedFrameName = msg.payload.name;

      const bytes = new Uint8Array(msg.payload.imageBytes);
      const blob = new Blob([bytes], { type: 'image/png' });
      const url = URL.createObjectURL(blob);
      document.getElementById('preview-img').src = url;
      document.getElementById('preview-name').textContent = msg.payload.name;
      document.getElementById('preview-size').textContent =
        `${Math.round(msg.payload.width)}×${Math.round(msg.payload.height)}`;
      document.getElementById('frame-preview').classList.add('visible');

      document.getElementById('btn-analyze').disabled = false;
      setLoading('btn-capture', 'spinner-capture', false);
      setStatus(`Frame "${msg.payload.name}" captured. Select a reviewer and run analysis.`);
    }

    if (msg.type === 'error') {
      setLoading('btn-capture', 'spinner-capture', false);
      setLoading('btn-analyze', 'spinner-analyze', false);
      setStatus(msg.message, 'error');
    }

    if (msg.type === 'status') {
      setStatus(msg.message);
    }
  };

  // Init
  loadData();
</script>
</body>
</html>
